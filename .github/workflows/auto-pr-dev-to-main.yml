# .github/workflows/auto-pr-dev-to-main.yml
name: Auto PR dev to main

on:
  push:
    branches:
      - dev

permissions:
  contents: write
  pull-requests: write

jobs:
  pr-to-main:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Create PR to main
        run: |
          gh pr create \
            --base main \
            --head dev \
            --title "Auto PR: dev → main" \
            --body "Auto-created from dev to main." \
          || echo "PR already exists"

          gh pr merge dev \
            --squash \
            --auto
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
