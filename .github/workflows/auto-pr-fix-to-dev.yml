name: Auto PR fix to dev

on:
  push:
    branches:
      - "fix/**"

permissions:
  contents: write
  pull-requests: write

jobs:
  pr-to-dev:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create PR to dev and enable auto-merge
        run: |
          PR_URL=$(gh pr create \
            --base dev \
            --head "${{ github.ref_name }}" \
            --title "Auto PR: ${{ github.ref_name }} → dev" \
            --body "Auto-created from fix branch to dev." \
            || gh pr view "${{ github.ref_name }}" --json url -q .url)

          gh pr merge "$PR_URL" \
            --squash \
            --auto \
            --delete-branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
